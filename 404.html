<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Page Not Found (404) — Viador Partners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
  <style>
    :root{ --cream:#FFFFFF; --cream-dark:#F2EDE6; --ink:#141210; --ink-soft:#52504C; --gold:#6B745E; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      font-family:'DM Sans',system-ui,-apple-system,sans-serif;
      background:var(--cream-dark); color:var(--ink);
      display:flex; align-items:center; justify-content:center; padding:32px;
    }
    .wrap{max-width:580px; text-align:center}
    .code{font-family:'DM Sans',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:22px}
    h1{font-family:'Fraunces',Georgia,serif; font-size:clamp(32px,5vw,52px); font-weight:600; line-height:1.08; letter-spacing:-.01em; margin:0 0 18px}
    p{font-size:17px; line-height:1.7; color:var(--ink-soft); margin:0 0 34px}
    .actions{display:flex; gap:14px; flex-wrap:wrap; justify-content:center}
    a.btn{
      display:inline-block; text-decoration:none; font-weight:700; font-size:15px;
      padding:14px 28px; border-radius:4px;
    }
    a.primary{background:var(--ink); color:var(--cream)}
    a.ghost{background:transparent; color:var(--ink); border:1px solid rgba(20,18,16,.2)}
    a.btn:hover{opacity:.88}
    .links{margin-top:36px; font-size:14px; color:var(--ink-soft)}
    .links a{color:var(--gold); text-decoration:none; margin:0 10px; font-weight:500}
    .links a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">Error 404</div>
    <h1>This deal didn't close.</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's route you back to financing that works.</p>
    <div class="actions">
      <a class="btn primary" href="/">Return home</a>
      <a class="btn ghost" href="/dscr">DSCR loans</a>
    </div>
    <div class="links">
      <a href="/dscr-loan-requirements">DSCR requirements</a>·
      <a href="/foreign-national-dscr-loans">Foreign national</a>·
      <a href="/partners">Partners</a>
    </div>
  </main>
</body>
</html>
